<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>受付ダッシュボード</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background-color: #111; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* 上部 45%: カメラ（絶対にはみ出させない強固な枠） */
    #camera-section { height: 45%; background: #000; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    #reader { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

    /* 名簿ボタン */
    .btn-list-open { position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 10px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; z-index: 20; }

    /* 下部 55%: 情報エリア（溢れたらスクロール可能に） */
    #info-section { height: 55%; background-color: #f0f2f5; color: #333; padding: 25px 20px 15px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; border-top-left-radius: 25px; border-top-right-radius: 25px; margin-top: -20px; z-index: 10; transition: background-color 0.3s; overflow-y: auto; }
    
    /* 文字サイズと余白の最適化 */
    #status-text { font-size: 18px; color: #888; font-weight: bold; margin-bottom: 5px; }
    #disp-id { font-size: 8vw; font-weight: 900; margin: 0; line-height: 1; color: #111; }
    #disp-name { font-size: 10vw; font-weight: 900; margin: 5px 0; text-align: center; width: 95%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #disp-price { font-size: 8vw; font-weight: bold; color: #d32f2f; border: 4px solid #d32f2f; padding: 0 20px; border-radius: 12px; margin: 5px 0; background: rgba(255,255,255,0.8); }

    /* 受付完了ボタン（常に枠内の一番下に陣取る） */
    .btn-complete { background: #111; color: white; border: none; padding: 15px 0; font-size: 28px; font-weight: bold; border-radius: 20px; width: 90%; cursor: pointer; margin-top: auto; margin-bottom: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); flex-shrink: 0; }

    .bg-green { background-color: #a5d6a7 !important; }
    .bg-red { background-color: #ef9a9a !important; }
    .bg-blue { background-color: #90caf9 !important; }

    /* スタンプ演出と名簿モーダル */
    #stamp-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(255,255,255,0.9); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
    .stamp-circle { width: 300px; height: 300px; border: 20px solid #d32f2f; border-radius: 50%; color: #d32f2f; font-size: 150px; font-weight: 900; display: flex; align-items: center; justify-content: center; transform: rotate(-15deg) scale(5); opacity: 0; }
    .stamp-animate { animation: stampDrop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes stampDrop { to { transform: rotate(-15deg) scale(1); opacity: 1; } }
    #insult-text { margin-top: 30px; font-size: 40px; font-weight: bold; color: #111; text-align: center; }

    #list-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: #fff; z-index: 1000; display: none; flex-direction: column; }
    .list-header { background: #111; color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 24px; }
    .btn-close { background: none; border: none; color: #fff; font-size: 36px; cursor: pointer; }
    .search-box { width: 100%; padding: 20px; font-size: 20px; border: none; border-bottom: 2px solid #ddd; box-sizing: border-box; }
    #list-container { flex: 1; overflow-y: auto; color: #333; }
    .list-item { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
    .badge-done { background: #333; color: #fff; padding: 5px 15px; border-radius: 8px; font-size: 16px; }

    #btn-start { position: absolute; padding: 20px 30px; font-size: 20px; background: #d32f2f; color: #fff; border: none; border-radius: 50px; z-index: 100; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: none; }
    #loading-cover { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index: 200; font-size: 24px; }
  </style>
</head>
<body>

  <div id="camera-section">
    <div id="loading-cover">データ読込中ッス...</div>
    <div id="reader"></div>
    <button class="btn-list-open" onclick="toggleList(true)">📋 名簿</button>
    <button id="btn-start" onclick="initScanner()">📷 カメラ起動</button>
  </div>

  <div id="info-section">
    <div id="status-text">スキャン待機中...</div>
    <p id="disp-id"></p>
    <h1 id="disp-name"></h1>
    <div id="disp-price" style="display:none;"></div>
    <button id="btn-complete" class="btn-complete" onclick="processCheckIn()" style="display:none;">受付完了</button>
  </div>

  <div id="list-modal">
    <div class="list-header"><span>名簿 (<span id="total-count">0</span>)</span><button class="btn-close" onclick="toggleList(false)">✕</button></div>
    <input type="text" id="search-input" class="search-box" placeholder="よみがな・番号で検索..." onkeyup="filterList()">
    <div id="list-container"></div>
  </div>

  <div style="margin: 15px 0; padding: 10px; background: #eef2f3; border-radius: 8px; border: 1px solid #ccc;">
  <button id="btn-check-missing" onclick="checkMissingIdsFrontend()" style="width: 100%; padding: 12px; background: #445566; color: #fff; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">
    🔍 空き番号（欠番）をチェック
  </button>
  
  <div id="missing-id-container" style="display: none; margin-top: 10px; position: relative;">
    <button onclick="closeMissingIds()" style="position: absolute; top: 5px; right: 5px; background: #a33; color: white; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0px rgba(0,0,0,0.2);">
      ✖ 閉じる
    </button>
    <pre id="missing-id-display" style="background: #fff; padding: 40px 10px 10px 10px; margin: 0; white-space: pre-wrap; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; color: #333; min-height: 100px;"></pre>
  </div>
</div>

<script>
  function checkMissingIdsFrontend() {
    const container = document.getElementById('missing-id-container');
    const display = document.getElementById('missing-id-display');
    
    // エリアを表示してロード中テキストを入れる
    container.style.display = 'block';
    display.innerText = "データを照会中...";

    // GASの裏側を呼び出す
    fetch(GAS_URL + "?action=getMissing")
      .then(response => response.text())
      .then(text => {
        display.innerText = text;
      })
      .catch(error => {
        display.innerText = "通信エラーッス: " + error;
      });
  }

  // ★閉じるボタンの機能
  function closeMissingIds() {
    document.getElementById('missing-id-container').style.display = 'none';
  }
</script>

  <div id="stamp-overlay"><div class="stamp-circle" id="stamp-circle">済</div><div id="insult-text"></div></div>

  <script>
    // ★★★ 超重要：あなたのGASのURL（デプロイID）をここに貼り付ける ★★★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzivBF5poLgvGmASb7Tvsr_waWX06LQ0UpRhcpkS-kw5DCTDR1XikQJTwD0oD041s8qRA/exec";

    let globalData = [];
    let scanner;
    let isScanning = false;
    let currentUser = null;

    // 1. 起動時に名簿をダウンロード（API経由に変更）
    window.onload = function() {
      fetch(GAS_URL + "?action=getData")
        .then(response => response.json())
        .then(data => {
          globalData = data;
          document.getElementById('loading-cover').style.display = 'none';
          document.getElementById('btn-start').style.display = 'block';
          renderList(globalData);
        })
        .catch(err => alert("データ取得エラー: " + err));
    };

    // 2. カメラ起動（脱獄により100%成功します）
    function initScanner() {
      document.getElementById('btn-start').style.display = 'none';
      scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
        .then(() => { isScanning = true; })
        .catch(err => {
          alert("カメラがブロックされたッス！ブラウザの設定を確認してッス！");
          document.getElementById('btn-start').style.display = 'block';
        });
    }

    // 3. QR読み取り成功時（ローカルデータと一瞬で照合）
    function onScanSuccess(decodedText) {
      if (!isScanning) return;
      let idStr = decodedText;
      try {
        const url = new URL(decodedText);
        idStr = url.searchParams.get("id") || decodedText;
      } catch(e) {}
      
      // ①まずゴミを除去した元のIDを「rawScanId」として定義する
      const rawScanId = String(idStr).replace(/'/g, '').trim();

      // ②枝番が付いている場合（001.0等）、小数点以下を切り捨ててベースID（001）にする
      const cleanScanId = rawScanId.split('.')[0];

      const user = globalData.find(u => {
        const cleanSheetId = String(u.id).replace(/'/g, '').trim();
        if (cleanSheetId === cleanScanId) return true;
        if (!isNaN(cleanSheetId) && !isNaN(cleanScanId) && Number(cleanSheetId) === Number(cleanScanId)) return true;
        return false;
      });

      if (user) {
        isScanning = false; 
        showUserInfo(user);
      } else {
        document.getElementById('status-text').innerText = `未登録のIDッス！(${cleanScanId})`;
        document.getElementById('status-text').style.color = "#d32f2f";
      }
    }

    // 4. ユーザー情報を画面にセット
  function showUserInfo(user) {
    currentUser = user;
    toggleList(false); 

    document.getElementById('status-text').innerText = "確認完了ッス！";
    document.getElementById('status-text').style.color = "#888";
    document.getElementById('disp-id').innerText = "No." + user.id;
    document.getElementById('disp-name').innerText = user.name;
    
    const p = document.getElementById('disp-price');
    p.innerText = user.price + "円";
    p.style.display = 'block';

    const btn = document.getElementById('btn-complete');
    // ★厳格な一致(===)をやめ、文字が含まれているか(includes)で判定する
    btn.innerText = (user.status && user.status.includes('済')) ? '済（再受付）' : '受付完了';
    btn.style.display = 'block';

    const sec = document.getElementById('info-section');
    sec.className = ''; 
    if (user.price === 200) sec.classList.add('bg-green');
    else if (user.price >= 400) sec.classList.add('bg-red');
    else sec.classList.add('bg-blue');
  }

  // 5. 「受付完了」ボタンを押した時の処理
  function processCheckIn() {
    if(!currentUser) return;

    let insult = "よし、入れ！";
    const pr = Number(currentUser.price);
    if(pr === 100) insult = "";
    else if(pr === 200) insult = "";
    else if(pr === 300) insult = "";
    else if(pr >= 400) insult = "";

    const overlay = document.getElementById('stamp-overlay');
    document.getElementById('insult-text').innerText = insult;
    overlay.style.display = 'flex';
    
    const stamp = document.getElementById('stamp-circle');
    stamp.classList.remove('stamp-animate');
    void stamp.offsetWidth;
    stamp.classList.add('stamp-animate');

    // ★GitHubからGAS(webapp.gs)へ通信を送る
    fetch(`${GAS_URL}?action=updateCheckIn&rowNum=${currentUser.rowNum}&status=済`)
      .then(res => res.json())
      .then(data => console.log("受付完了", data));

    // ★スマホ内のデータも、スプシに合わせて絵文字付きに上書きする！
    currentUser.status = '受付済';
    // globalData の該当レコードも同期して書き換える
    const idx = globalData.findIndex(u => u.rowNum === currentUser.rowNum);
    if (idx !== -1) globalData[idx].status = '受付済';

    document.getElementById('btn-complete').innerText = '済（再受付）';
    
    // 名簿を再描画
    renderList(globalData);    

    setTimeout(() => {
      overlay.style.display = 'none';
      resetUI();
      isScanning = true;
    }, 2000);
  }

  // === 名簿リスト描画（絶対表示・最強防弾版） ===
  function renderList(arr) {
    const c = document.getElementById('list-container');
    document.getElementById('total-count').innerText = arr.length;
    
    let html = '';
    for (let i = 0; i < arr.length; i++) {
      let u = arr[i];
      
      // 1. 文字列として安全に判定。絵文字があっても「済」が含まれれば問答無用でTRUE
      let isDone = String(u.status || '').indexOf('済') !== -1;
      
      // 2. JSONエラーでリストが崩れるのを防ぐ絶対安全な処理
      let uJson = JSON.stringify(u).replace(/'/g, "\\'"); 
      
      // 3. CSSがなくても絶対に表示されるよう、デザイン（黒背景・白文字）を直書き
      let badgeHtml = isDone 
        ? '<span style="background: #333; color: #fff; padding: 5px 15px; border-radius: 8px; font-size: 16px; font-weight:bold;">済</span>' 
        : '';
      
      // リストの生成
      html += `<div class="list-item" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 20px; cursor: pointer;" onclick='showUserInfo(${uJson})'>
        <div><small style="color: #666;">No.${u.id}</small><br><strong style="color: #111;">${u.name}</strong></div>
        ${badgeHtml}
      </div>`;
    }
    
    c.innerHTML = html;
  }
    function resetUI() {
      currentUser = null;
      document.getElementById('info-section').className = '';
      document.getElementById('status-text').innerText = "次のQRをかざしてッス！";
      document.getElementById('disp-id').innerText = "";
      document.getElementById('disp-name').innerText = "";
      document.getElementById('disp-price').style.display = 'none';
      document.getElementById('btn-complete').style.display = 'none';
    }

    // === 名簿機能（古いコードを完全排除した絶対表示版） ===
  function toggleList(show) { document.getElementById('list-modal').style.display = show ? 'flex' : 'none'; }

  function renderList(arr) {
    const c = document.getElementById('list-container');
    document.getElementById('total-count').innerText = arr.length;
    
    let html = '';
    for (let i = 0; i < arr.length; i++) {
      let u = arr[i];
      let isDone = String(u.status || '').indexOf('済') !== -1;
      let uJson = JSON.stringify(u).replace(/'/g, "\\'"); 
      
      let badgeHtml = isDone 
        ? '<span style="background: #333; color: #fff; padding: 5px 15px; border-radius: 8px; font-size: 16px; font-weight:bold;">済</span>' 
        : '';
      
      html += `<div class="list-item" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 20px; cursor: pointer;" onclick='showUserInfo(${uJson})'>
        <div><small style="color: #666;">No.${u.id}</small><br><strong style="color: #111;">${u.name}</strong></div>
        ${badgeHtml}
      </div>`;
    }
    
    c.innerHTML = html;
  }
    function filterList() {
      const q = document.getElementById('search-input').value.toLowerCase();
      renderList(globalData.filter(u => u.yomi.includes(q) || u.name.includes(q) || u.id.includes(q)));
    }
  </script>
</body>
</html>
